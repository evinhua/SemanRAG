services:
  # ── Application ────────────────────────────────────────────────
  semanrag-api:
    build: .
    container_name: semanrag-api
    ports:
      - "9621:9621"
    env_file: .env
    volumes:
      - semanrag-data:/app/data
      - ./semanrag_webui/dist:/app/static
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9621/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks: [semanrag]
    restart: unless-stopped

  # ── PostgreSQL (pgvector + AGE) ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: semanrag-postgres
    environment:
      POSTGRES_USER: semanrag
      POSTGRES_PASSWORD: semanrag
      POSTGRES_DB: semanrag
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semanrag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  # ── Neo4j ──────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: semanrag-neo4j
    environment:
      NEO4J_AUTH: neo4j/semanrag
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: semanrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  # ── Milvus (standalone + etcd + minio) ─────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: semanrag-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: semanrag-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: semanrag-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    command: milvus run standalone
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  # ── Qdrant ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: semanrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  # ── OpenSearch ─────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: semanrag-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: semanrag-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [semanrag]
    restart: unless-stopped

  # ── Observability ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: semanrag-otel
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    networks: [semanrag]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: semanrag-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on: [semanrag-api, otel-collector]
    networks: [semanrag]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: semanrag-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: semanrag
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/semanrag-dashboard.json
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [semanrag]
    restart: unless-stopped

networks:
  semanrag:
    driver: bridge

volumes:
  semanrag-data:
  pg-data:
  neo4j-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
  qdrant-data:
  opensearch-data:
  mongo-data:
  prometheus-data:
  grafana-data:
