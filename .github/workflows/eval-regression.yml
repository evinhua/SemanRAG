name: Eval Regression Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "semanrag/**"
      - "tests/**"

jobs:
  golden-set:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test,evaluation]"

      - name: Run golden-set evaluation
        env:
          LLM_BINDING: ${{ secrets.EVAL_LLM_BINDING }}
          LLM_MODEL: ${{ secrets.EVAL_LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.EVAL_LLM_API_KEY }}
          EMBEDDING_BINDING: ${{ secrets.EVAL_EMBEDDING_BINDING }}
          EMBEDDING_MODEL: ${{ secrets.EVAL_EMBEDDING_MODEL }}
        run: |
          pytest tests/ -m "regression" \
            --tb=short -q \
            --junitxml=eval-results.xml

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.xml

      - name: Check regression threshold
        if: always()
        run: |
          python -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('eval-results.xml')
          suite = tree.getroot().find('.//testsuite')
          if suite is None:
              print('No test suite found'); sys.exit(1)
          failures = int(suite.get('failures', 0))
          errors = int(suite.get('errors', 0))
          if failures + errors > 0:
              print(f'REGRESSION DETECTED: {failures} failures, {errors} errors')
              sys.exit(1)
          print('All golden-set tests passed')
          "
